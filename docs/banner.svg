<svg viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg">
  <title>Omnipub Banner</title>
  <desc>One-click publish Markdown articles to 11 tech blog platforms</desc>

  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020617"/>
      <stop offset="50%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#020617"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="accent-v" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.15"/>
    </linearGradient>
    <radialGradient id="glow1" cx="30%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="70%" r="40%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0"/>
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.4"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#06b6d4"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#glow1)"/>
  <rect width="1280" height="640" fill="url(#glow2)"/>

  <!-- Subtle dot grid -->
  <g opacity="0.08">
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="white"/>
    </pattern>
    <rect width="1280" height="640" fill="url(#dots)"/>
  </g>

  <!-- ================================================================ -->
  <!-- LEFT: Branding                                                   -->
  <!-- ================================================================ -->

  <!-- Logo mark -->
  <g transform="translate(100, 180)">
    <rect width="72" height="72" rx="18" fill="url(#accent)" filter="url(#shadow)"/>
    <!-- Stylized "O" + broadcast icon -->
    <circle cx="36" cy="36" r="14" fill="none" stroke="white" stroke-width="3"/>
    <circle cx="36" cy="36" r="5" fill="white"/>
    <!-- Broadcast waves -->
    <path d="M 52 20 A 24 24 0 0 1 52 52" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
    <path d="M 58 14 A 32 32 0 0 1 58 58" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  </g>

  <!-- Title -->
  <text x="100" y="310" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="800" fill="white" letter-spacing="-1">Omnipub</text>

  <!-- Accent underline -->
  <rect x="100" y="324" width="240" height="4" rx="2" fill="url(#accent)"/>

  <!-- Tagline -->
  <text x="100" y="370" font-family="system-ui, sans-serif" font-size="24" font-weight="500" fill="#94a3b8">Write once in Markdown,</text>
  <text x="100" y="402" font-family="system-ui, sans-serif" font-size="24" font-weight="500" fill="#94a3b8">publish to <tspan fill="#06b6d4" font-weight="700">11</tspan> platforms instantly</text>

  <!-- Tech stack pills -->
  <g transform="translate(100, 440)">
    <rect width="80" height="30" rx="15" fill="none" stroke="#334155" stroke-width="1.5"/>
    <text x="40" y="20" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">Vue 3</text>

    <rect x="92" width="80" height="30" rx="15" fill="none" stroke="#334155" stroke-width="1.5"/>
    <text x="132" y="20" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">FastAPI</text>

    <rect x="184" width="120" height="30" rx="15" fill="none" stroke="#334155" stroke-width="1.5"/>
    <text x="244" y="20" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">Chrome MV3</text>

    <rect x="316" width="100" height="30" rx="15" fill="none" stroke="#334155" stroke-width="1.5"/>
    <text x="366" y="20" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">Open Source</text>
  </g>

  <!-- ================================================================ -->
  <!-- RIGHT: Flow visualization                                        -->
  <!-- ================================================================ -->

  <!-- Markdown source card -->
  <g transform="translate(620, 160)">
    <rect width="160" height="120" rx="12" fill="#0f172a" stroke="#334155" stroke-width="2" filter="url(#shadow)"/>
    <!-- Title bar -->
    <rect width="160" height="28" rx="12" fill="#1e293b"/>
    <rect y="14" width="160" height="14" fill="#1e293b"/>
    <!-- Dots -->
    <circle cx="16" cy="14" r="4" fill="#ef4444" opacity="0.8"/>
    <circle cx="28" cy="14" r="4" fill="#f59e0b" opacity="0.8"/>
    <circle cx="40" cy="14" r="4" fill="#22c55e" opacity="0.8"/>
    <!-- Markdown content lines -->
    <text x="16" y="50" font-family="monospace" font-size="10" fill="#6366f1"># Article Title</text>
    <rect x="16" y="60" width="120" height="3" rx="1.5" fill="#334155"/>
    <rect x="16" y="70" width="100" height="3" rx="1.5" fill="#334155"/>
    <rect x="16" y="80" width="110" height="3" rx="1.5" fill="#334155"/>
    <text x="16" y="102" font-family="monospace" font-size="9" fill="#475569">```python</text>
  </g>

  <!-- Central hub -->
  <g transform="translate(830, 186)">
    <!-- Glow behind hub -->
    <circle cx="35" cy="35" r="50" fill="#6366f1" opacity="0.08"/>
    <!-- Hub circle -->
    <circle cx="35" cy="35" r="35" fill="url(#accent)" filter="url(#shadow)"/>
    <!-- Lightning bolt -->
    <path d="M 30 18 L 25 38 L 33 38 L 28 52 L 45 32 L 37 32 L 42 18 Z" fill="white"/>
  </g>

  <!-- Arrows: source → hub -->
  <line x1="780" y1="220" x2="830" y2="220" stroke="#6366f1" stroke-width="2.5" marker-end="url(#arr)" opacity="0.8"/>

  <!-- Arrows: hub → platforms (fan out) -->
  <line x1="900" y1="200" x2="960" y2="160" stroke="#06b6d4" stroke-width="2" marker-end="url(#arr)" opacity="0.6"/>
  <line x1="900" y1="215" x2="960" y2="210" stroke="#06b6d4" stroke-width="2" marker-end="url(#arr)" opacity="0.6"/>
  <line x1="900" y1="230" x2="960" y2="260" stroke="#06b6d4" stroke-width="2" marker-end="url(#arr)" opacity="0.6"/>
  <line x1="900" y1="240" x2="960" y2="310" stroke="#06b6d4" stroke-width="2" marker-end="url(#arr)" opacity="0.6"/>

  <!-- Platform grid -->
  <g transform="translate(970, 130)">
    <!-- Column 1 -->
    <rect x="0" y="0" width="100" height="32" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1.5"/>
    <text x="50" y="21" font-family="system-ui, sans-serif" font-size="11" fill="#e2e8f0" text-anchor="middle">Juejin</text>

    <rect x="0" y="42" width="100" height="32" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1.5"/>
    <text x="50" y="63" font-family="system-ui, sans-serif" font-size="11" fill="#e2e8f0" text-anchor="middle">CSDN</text>

    <rect x="0" y="84" width="100" height="32" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1.5"/>
    <text x="50" y="105" font-family="system-ui, sans-serif" font-size="11" fill="#e2e8f0" text-anchor="middle">Zhihu</text>

    <rect x="0" y="126" width="100" height="32" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1.5"/>
    <text x="50" y="147" font-family="system-ui, sans-serif" font-size="11" fill="#e2e8f0" text-anchor="middle">Cnblogs</text>

    <!-- Column 2 -->
    <rect x="112" y="0" width="100" height="32" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1.5"/>
    <text x="162" y="21" font-family="system-ui, sans-serif" font-size="11" fill="#e2e8f0" text-anchor="middle">Toutiao</text>

    <rect x="112" y="42" width="100" height="32" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1.5"/>
    <text x="162" y="63" font-family="system-ui, sans-serif" font-size="11" fill="#e2e8f0" text-anchor="middle">51CTO</text>

    <rect x="112" y="84" width="100" height="32" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1.5"/>
    <text x="162" y="105" font-family="system-ui, sans-serif" font-size="11" fill="#e2e8f0" text-anchor="middle">Segmentfault</text>

    <rect x="112" y="126" width="100" height="32" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1.5"/>
    <text x="162" y="147" font-family="system-ui, sans-serif" font-size="11" fill="#e2e8f0" text-anchor="middle">Tencent</text>

    <!-- Bottom row (3 centered) -->
    <rect x="0" y="168" width="100" height="32" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1.5"/>
    <text x="50" y="189" font-family="system-ui, sans-serif" font-size="11" fill="#e2e8f0" text-anchor="middle">OSChina</text>

    <rect x="112" y="168" width="100" height="32" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1.5"/>
    <text x="162" y="189" font-family="system-ui, sans-serif" font-size="11" fill="#e2e8f0" text-anchor="middle">InfoQ</text>

    <!-- Bilibili centered below -->
    <rect x="56" y="210" width="100" height="32" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1.5"/>
    <text x="106" y="231" font-family="system-ui, sans-serif" font-size="11" fill="#e2e8f0" text-anchor="middle">Bilibili</text>

    <!-- "Published" badge -->
    <g transform="translate(56, 256)">
      <rect width="100" height="26" rx="13" fill="url(#accent)" opacity="0.9"/>
      <text x="50" y="18" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">Published!</text>
    </g>
  </g>

  <!-- ================================================================ -->
  <!-- BOTTOM: Gradient fade bar                                        -->
  <!-- ================================================================ -->
  <rect y="590" width="1280" height="50" fill="url(#accent-v)" opacity="0.4"/>
  <text x="640" y="622" font-family="system-ui, sans-serif" font-size="14" fill="#64748b" text-anchor="middle">github.com/addozhang/omnipub</text>
</svg>
