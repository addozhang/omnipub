name: 功能建议
description: 提出新功能或改进想法
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢提出新想法！请详细描述你的需求和场景。

  - type: textarea
    id: problem
    attributes:
      label: 你想解决什么问题？
      description: 描述当前的痛点或不便
      placeholder: 例如：我希望能定时发布文章，避开高峰时段
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 你期望的解决方案
      description: 描述你希望 Omnipub 如何实现这个功能
      placeholder: 例如：在发布页增加"定时发布"选项，可选择具体时间
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案（可选）
      description: 你考虑过的其他方案

  - type: dropdown
    id: scope
    attributes:
      label: 涉及子系统
      multiple: true
      options:
        - 后端 (FastAPI)
        - 前端 (Vue 3)
        - Chrome 扩展
        - 文档
        - CI/CD
        - 其他
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: 补充信息
      description: 截图、参考链接、相关 issue 等
